<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;

            background: #f8f9fa;

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;
            background:
                linear-gradient(rgba(0, 0, 0, 0.55),
                    rgba(0, 0, 0, 0.55)),
                url("https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1600&q=80");

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow-x: hidden;
        }

        .box {
            width: 550px;

            padding: 40px;

            border-radius: 20px;

            text-align: center;

            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.12);

            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .success-icon {
            width: 100px;
            height: 100px;

            color: white;

            font-size: 50px;

            border-radius: 50%;

            display: flex;
            justify-content: center;
            align-items: center;

            margin: auto;

            background:
                linear-gradient(135deg,
                    #28a745,
                    #4cd964);

            box-shadow:
                0 0 25px rgba(40, 167, 69, 0.5);
        }

        h1 {
            color: white;
            margin-top: 20px;
        }

        .message {
            color: #f1f1f1;
            font-size: 18px;
        }

        .rating-box {
            margin-top: 20px;

            background: rgba(255, 255, 255, 0.08);

            padding: 20px;

            border-radius: 15px;

            color: white;

            font-style: italic;
        }

        .review-box {
            margin-top: 20px;

            padding: 15px;

            border-radius: 15px;

            background: rgba(255, 215, 0, 0.15);

            color: #FFD700;

            font-size: 24px;

            font-weight: bold;

            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .btn-group {
            margin-top: 30px;
        }

        .btn {
            display: inline-block;

            margin-top: 25px;
            margin-right: 10px;

            padding: 12px 22px;

            border-radius: 10px;

            text-decoration: none;

            color: white;

            font-weight: bold;

            transition: 0.3s;
        }

        .history-btn {
            background:
                linear-gradient(135deg,
                    #ff4d2e,
                    #ff7a59);
        }

        .order-btn {
            background:
                linear-gradient(135deg,
                    #28a745,
                    #4cd964);
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        .box {
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {

            .box {
                width: 95%;
                padding: 25px 15px;
                margin: 15px;
            }

            .success-icon {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }

            h1 {
                font-size: 28px;
            }

            .message {
                font-size: 16px;
                line-height: 1.6;
            }

            .rating-box {
                padding: 15px;
                font-size: 18px;
            }

            .review-box {
                font-size: 18px;
                word-wrap: break-word;
                padding: 12px;
            }

            .btn-group {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            .btn {
                display: block;
                width: 100%;
                margin: 0;
                text-align: center;
                padding: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="box">

        <div class="success-icon">
            ✓
        </div>

        <h1>Review Submitted!</h1>

        <p class="message">
            Thanks for sharing your experience with us ❤️
        </p>

        <div class="rating-box">
            ⭐ {{ rating }}/5
        </div>

        <div class="review-box">
            "{{ review }}"
        </div>

        <div class="btn-group">

            <a href="{% url 'order_history' %}" class="btn history-btn">
                📦 Order History
            </a>

            <a href="{% url 'food_list' %}" class="btn order-btn">
                🍔 Order Again
            </a>

        </div>

    </div>
</body>

</html>

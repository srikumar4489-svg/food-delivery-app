<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ category.name }}</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: url("https://images.unsplash.com/photo-1504674900247-0877df9cc836") no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 42px;
        }

        .foods {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
        }

        .food-card {
            width: 320px;
            overflow: hidden;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);

            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);

            transition: 0.3s;
        }

        .food-card:hover {
            transform: translateY(-8px);
        }

        .food-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .food-info {
            padding: 20px;
            color: white;
        }


        .food-info h2 {
            margin-bottom: 10px;
        }

        .restaurant {
            color: #ffd27f;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .price {
            color: #ffd700;
            font-size: 22px;
            margin-bottom: 15px;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            text-decoration: none;
            background: #ff6b00;
            color: white;
            border-radius: 10px;
            font-weight: bold;
        }

        .top-buttons {
            position: sticky;
            top: 15px;

            display: flex;
            justify-content: space-between;

            margin-bottom: 30px;
            z-index: 1000;
        }

        .back-btn,
        .cart-btn {
            padding: 12px 25px;

            text-decoration: none;
            color: white;

            font-weight: bold;
            border-radius: 12px;

            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .back-btn {
            background: rgba(255, 107, 0, 0.9);
        }

        .cart-btn {
            background: rgba(40, 167, 69, 0.9);
        }
    </style>
</head>

<body>

    <div class="overlay">

        <div class="top-buttons">

            <a href="{% url 'category_list' %}" class="back-btn">
                ← Categories
            </a>

            <a href="{% url 'cart_list' %}" class="cart-btn">
                🛒 Cart
            </a>

        </div>

        <h1>🍽 {{ category.name }}</h1>

        <div class="foods">

            {% for food in foods %}

            <div class="food-card">

                <img src="{{ food.image.url }}" alt="">

                <div class="food-info">

                    <h2>{{ food.name }}</h2>

                    <p class="restaurant">
                        🏪 {{ food.restaurant.name }}
                    </p>

                    <p>{{ food.description }}</p>

                    <p class="price">
                        ₹{{ food.price }}
                    </p>

                    <a href="{% url 'add_to_cart' food.id %}" class="btn">
                        Add To Cart
                    </a>

                </div>

            </div>

            {% empty %}

            <h2 style="color:white;">
                No foods available
            </h2>

            {% endfor %}

        </div>

    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Foods</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.45),
                    rgba(0, 0, 0, 0.45)),
                url("https://images.unsplash.com/photo-1504674900247-0877df9cc836") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            overflow-x: hidden;

        }

        h1 {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
        }

        .food-container {
            width: 85%;
            max-width: 1100px;
            margin: 30px auto;
        }

        .food-card {
            display: flex;
            gap: 20px;
            padding: 18px;
            margin-bottom: 20px;

            background: rgba(255, 255, 255, 0.12);

            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, 0.2);

            border-radius: 18px;

            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.25);

            align-items: center;

            transition: all 0.3s ease;
        }

        .food-card:hover {
            transform: translateY(-6px);

            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.35);
        }

        .food-card img {
            width: 180px;
            height: 130px;
            object-fit: cover;

            border-radius: 14px;

            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .food-details {
            flex: 1;
        }

        .food-details h2 {
            color: white;
            margin-bottom: 10px;
        }

        .food-details p {
            margin: 6px 0;
            color: rgba(255, 255, 255, 0.85);
        }

        .food-card .price {
            color: #ffd700;
            font-size: 22px;
            font-weight: bold;
        }

        .cart-btn {
            display: inline-block;
            margin-top: 10px;

            background: linear-gradient(135deg,
                    #ff4d2e,
                    #ff7a59);

            color: white;
            text-decoration: none;

            padding: 12px 18px;

            border-radius: 10px;

            font-weight: bold;

            transition: 0.3s;
        }

        .cart-btn:hover {
            transform: scale(1.05);
        }

        .top-buttons {
            position: sticky;
            top: 15px;

            display: flex;
            justify-content: space-between;

            margin-bottom: 30px;
            z-index: 1000;
        }

        .back-btn,
        .cart-btn {
            padding: 12px 25px;

            text-decoration: none;
            color: white;

            font-weight: bold;
            border-radius: 12px;

            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .back-btn {
            background: rgba(255, 107, 0, 0.9);
        }

        .cart-btn {
            background: rgba(40, 167, 69, 0.9);
        }

        .search-box {
            text-align: center;
            margin: 25px 15px;
        }

        .search-box form {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-box input {
            width: 100%;
            max-width: 350px;
            padding: 12px 18px;
            border: none;
            border-radius: 30px;
            outline: none;
            font-size: 16px;

            background: rgba(255, 255, 255, 0.15);
            color: white;

            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-box button {
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            cursor: pointer;

            background: linear-gradient(135deg,
                    #ff4d2e,
                    #ff7a59);

            color: white;
            font-weight: bold;

            transition: 0.3s;
        }

        .search-box button:hover {
            transform: scale(1.05);
        }

        @media(max-width:768px) {

            .food-container {
                width: 95%;
            }

            .food-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 20px;
            }

            .food-card img {
                width: 100%;
                max-width: 300px;
                height: 200px;
                object-fit: cover;
            }

            .food-details {
                width: 100%;
                margin-top: 15px;
            }

            .food-details h2 {
                font-size: 28px;
                margin-bottom: 10px;
            }

            .food-details p {
                font-size: 16px;
            }

            .price {
                font-size: 26px !important;
                margin: 10px 0;
            }

            .food-details .cart-btn {
                display: inline-block;
                width: 220px;
                margin-top: 15px;
            }

            .top-buttons {
                top: 10px;
            }

            .back-btn,
            .cart-btn {
                padding: 10px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <h1>All Foods</h1>

    <div class="search-box">

        <form method="GET">

            <input type="text" name="q" list="foods-list" placeholder="🔍 Search food..." value="{{ request.GET.q }}">

            <datalist id="foods-list">
                {% for food in foods %}
                <option value="{{ food.name }}">
                    {% endfor %}
            </datalist>

            <button type="submit">
                Search
            </button>

        </form>

    </div>

    <div class="food-container">

        <div class="top-buttons">

            <a href="{% url 'customer_home' %}" class="back-btn">
                ← Home
            </a>

            <a href="{% url 'cart_list' %}" class="cart-btn">
                🛒 Cart
            </a>

        </div>


        {% for food in foods %}
        <div class="food-card">

            {% if food.image %}
            <img src="{{ food.image.url }}" alt="{{ food.name }}">
            {% endif %}

            <div class="food-details">
                <h2>{{ food.name }}</h2>

                <p class="price">₹{{ food.price }}</p>

                <p>Restaurant: {{ food.restaurant.name }}</p>

                <a href="{% url 'add_to_cart' food.id %}" class="cart-btn">
                    Add to Cart
                </a>
            </div>

        </div>
        {% endfor %}

    </div>
</body>

</html>

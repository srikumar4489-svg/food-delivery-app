<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Categories</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: url("https://images.unsplash.com/photo-1504674900247-0877df9cc836") no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            padding: 50px 20px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 40px;
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
        }

        .category-card {
            width: 280px;
            padding: 30px;
            text-align: center;

            text-decoration: none;
            color: white;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);

            transition: 0.3s;

            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .category-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.2);
        }

        .category-card h2 {
            margin-bottom: 10px;
        }



        .category-card {
            width: 300px;
            overflow: hidden;

            text-decoration: none;
            color: white;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);

            transition: 0.3s;

            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .category-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .card-content {
            padding: 20px;
            text-align: center;
        }

        .category-card:hover {
            transform: translateY(-8px) scale(1.03);
        }

        .top-buttons {
            position: sticky;
            top: 15px;

            display: flex;
            justify-content: space-between;

            margin-bottom: 30px;
            z-index: 1000;
        }

        .back-btn,
        .cart-btn {
            padding: 12px 25px;

            text-decoration: none;
            color: white;

            font-weight: bold;
            border-radius: 12px;

            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .back-btn {
            background: rgba(255, 107, 0, 0.9);
        }

        .cart-btn {
            background: rgba(40, 167, 69, 0.9);
        }
    </style>

</head>

<body>

    <div class="overlay">

        <div class="top-buttons">

            <a href="{% url 'customer_home' %}" class="back-btn">
                ← Home
            </a>

            <a href="{% url 'cart_list' %}" class="cart-btn">
                🛒 Cart
            </a>

        </div>

        <h1>🍽 Food Categories</h1>

        <div class="categories">

            {% for category in categories %}

            <a href="{% url 'category_foods' category.id %}" class="category-card">

                {% if category.image %}
                <img src="{{ category.image.url }}" alt="{{ category.name }}">
                {% endif %}

                <div class="card-content">
                    <h2>{{ category.name }}</h2>

                    <p>
                        Click to view all foods
                    </p>
                </div>

            </a>

            {% endfor %}

        </div>

    </div>

</body>

</html>

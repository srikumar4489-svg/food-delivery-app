<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;

            background:
                linear-gradient(rgba(0, 0, 0, 0.55),
                    rgba(0, 0, 0, 0.55)),
                url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1600&q=80");

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        h1 {
            text-align: center;
            padding: 25px;

            margin: 0;

            color: white;

            background: rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            border-bottom: 1px solid rgba(255, 255, 255, 0.15);

            letter-spacing: 2px;
        }

        h2 {
            text-align: center;
            margin-top: 25px;
            color: white;
        }

        .restaurant-info {
            text-align: center;
            color: #f1f1f1;
            font-size: 18px;
            margin: 20px 0;
        }

        .food-container {
            width: 75%;
            max-width: 1000px;
            margin: 20px auto;
        }

        .food-card {
            display: flex;
            gap: 20px;

            padding: 18px;

            margin-bottom: 20px;

            border-radius: 20px;

            background: rgba(255, 255, 255, 0.12);

            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, 0.15);

            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);

            transition: 0.3s;
        }

        .food-card:hover {
            transform: translateY(-8px);
        }

        .food-card img {
            width: 180px;
            height: 130px;
            object-fit: cover;
            border-radius: 15px;
        }

        .food-details h3 {
            color: white;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .food-details p {
            color: #e8e8e8;
        }

        .food-details .price {
            color: #ffd700;
            font-weight: bold;
            font-size: 22px;
        }

        button {
            border: none;

            padding: 12px 20px;

            border-radius: 10px;

            margin-top: 10px;

            cursor: pointer;

            background: linear-gradient(135deg,
                    #ff4d2e,
                    #ff7a59);

            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        button:hover {
            background: #e63e20;
        }

        .top-buttons {
            position: sticky;
            top: 15px;

            display: flex;
            justify-content: space-between;

            margin-bottom: 30px;
            z-index: 1000;
        }

        .back-btn,
        .cart-btn {
            padding: 12px 25px;

            text-decoration: none;
            color: white;

            font-weight: bold;
            border-radius: 12px;

            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .back-btn {
            background: rgba(255, 107, 0, 0.9);
        }

        .cart-btn {
            background: rgba(40, 167, 69, 0.9);
        }

        @media (max-width: 768px) {

            body {
                overflow-x: hidden;
            }

            .food-container {
                width: 95%;
                margin: 20px auto;
            }

            .food-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 20px;
            }

            .food-card img {
                width: 100%;
                max-width: 300px;
                height: 200px;
                object-fit: cover;
            }

            .food-details {
                width: 100%;
                margin-top: 15px;
            }

            .food-details h3 {
                font-size: 28px;
                margin-bottom: 10px;
            }

            .food-details p {
                font-size: 16px;
                line-height: 1.6;
            }

            .food-details .price {
                font-size: 26px;
                margin-top: 10px;
            }

            button {
                width: 100%;
                max-width: 250px;
            }

            .top-buttons {
                top: 10px;
            }

            .back-btn,
            .cart-btn {
                padding: 10px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <h1>{{ restaurant.name }}</h1>

    <p class="restaurant-info">{{ restaurant.address }}</p>

    <hr>

    <h2>Foods</h2>



    <div class="food-container">

        <div class="top-buttons">

            <a href="{% url 'customer_restaurant_list' %}" class="back-btn">
                ← Restaurant List
            </a>

            <a href="{% url 'cart_list' %}" class="cart-btn">
                🛒 Cart
            </a>

        </div>

        {% for food in foods %}

        <div class="food-card">

            {% if food.image %}
            <img src="{{ food.image.url }}">
            {% endif %}

            <div class="food-details">

                <h3>{{ food.name }}</h3>

                <p>{{ food.description }}</p>

                <p class="price">₹{{ food.price }}</p>

                <button>
                    <a href="{% url 'add_to_cart' food.id %}">
                        🛒 Add To Cart
                    </a>
                </button>

            </div>

        </div>

        {% endfor %}

    </div>
</body>

</html>

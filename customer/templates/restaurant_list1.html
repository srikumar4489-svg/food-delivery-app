<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurants List</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;

            background:
                linear-gradient(rgba(0, 0, 0, 0.55),
                    rgba(0, 0, 0, 0.55)),
                url("https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=1600&q=80");

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow-x: hidden;
        }

        h1 {
            margin: 0;
            padding: 25px;

            text-align: center;

            color: white;

            background: rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            border-bottom: 1px solid rgba(255, 255, 255, 0.15);

            letter-spacing: 2px;

            font-size: 34px;
        }

        .restaurant-container {
            width: 75%;
            margin: 40px auto;
        }

        .restaurant-card {
            display: flex;
            gap: 20px;
            align-items: center;

            padding: 18px;
            margin-bottom: 22px;

            border-radius: 20px;

            background: rgba(255, 255, 255, 0.12);

            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, 0.15);

            box-shadow:
                0 8px 30px rgba(0, 0, 0, 0.25);

            transition: 0.3s;
        }

        .restaurant-card:hover {
            transform: translateY(-8px);
        }

        .restaurant-card img {
            width: 180px;
            height: 130px;
            object-fit: cover;
            border-radius: 15px;
            transition: 0.3s;
        }

        .restaurant-card img:hover {
            transform: scale(1.05);
        }

        .restaurant-details {
            flex: 1;
        }

        .restaurant-details h2 {
            margin: 0;
            color: white;
            font-size: 28px;
        }

        .restaurant-details p {
            margin: 10px 0;
            color: white;
            font-size: 16px;
        }

        .view-btn {
            display: inline-block;

            margin-top: 10px;

            padding: 12px 20px;

            border-radius: 10px;

            text-decoration: none;

            color: white;

            font-weight: bold;

            background: linear-gradient(135deg,
                    #ff4d2e,
                    #ff7a59);

            box-shadow:
                0 4px 15px rgba(255, 77, 46, 0.4);

            transition: 0.3s;
        }

        .view-btn:hover {
            transform: translateY(-3px);

            box-shadow:
                0 8px 20px rgba(255, 77, 46, 0.6);
        }

        .top-buttons {
            position: sticky;
            top: 15px;

            display: flex;
            justify-content: space-between;

            margin-bottom: 30px;
            z-index: 1000;
        }

        .back-btn,
        .cart-btn {
            padding: 12px 25px;

            text-decoration: none;
            color: white;

            font-weight: bold;
            border-radius: 12px;

            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .back-btn {
            background: rgba(255, 107, 0, 0.9);
        }

        .cart-btn {
            background: rgba(40, 167, 69, 0.9);
        }

        @media (max-width: 768px) {

            .restaurant-container {
                width: 95%;
                margin: 20px auto;
            }

            .restaurant-card {
                flex-direction: column;
                text-align: center;
                padding: 15px;
            }

            .restaurant-card img {
                width: 100%;
                height: 200px;
                max-width: 300px;
            }

            .restaurant-details {
                width: 100%;
            }

            .restaurant-details h2 {
                font-size: 24px;
            }

            .restaurant-details p {
                font-size: 14px;
            }

            .view-btn {
                display: inline-block;
                margin-top: 15px;
            }

            .top-buttons {
                top: 10px;
            }

            .back-btn,
            .cart-btn {
                padding: 10px 18px;
                font-size: 14px;
            }

        }
    </style>
</head>

<body>
    <h1>🍽 Restaurants List</h1>

    <div class="restaurant-container">
        <div class="top-buttons">

            <a href="{% url 'customer_home' %}" class="back-btn">
                ← Home
            </a>

            <a href="{% url 'cart_list' %}" class="cart-btn">
                🛒 Cart
            </a>

        </div>

        {% for restaurant in restaurants %}

        <div class="restaurant-card">

            {% if restaurant.image %}
            <img src="{{ restaurant.image.url }}">
            {% endif %}

            <div class="restaurant-details">

                <h2>🍽 {{ restaurant.name }}</h2>

                <p>{{ restaurant.address }}</p>

                <a class="view-btn" href="{% url 'restaurant_detail' restaurant.id %}">
                    View Menu
                </a>

            </div>

        </div>

        {% endfor %}

    </div>
</body>

</html>

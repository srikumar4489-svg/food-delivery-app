<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurants List</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;

            background:
                linear-gradient(rgba(0, 0, 0, 0.55),
                    rgba(0, 0, 0, 0.55)),
                url("https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=1600&q=80");

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        h1 {
            margin: 0;
            padding: 25px;

            text-align: center;

            color: white;

            background: rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            border-bottom: 1px solid rgba(255, 255, 255, 0.15);

            letter-spacing: 2px;

            font-size: 34px;
        }

        .restaurant-container {
            width: 75%;
            margin: 40px auto;
        }

        .restaurant-card {
            display: flex;
            gap: 20px;
            align-items: center;

            padding: 18px;
            margin-bottom: 22px;

            border-radius: 20px;

            background: rgba(255, 255, 255, 0.12);

            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, 0.15);

            box-shadow:
                0 8px 30px rgba(0, 0, 0, 0.25);

            transition: 0.3s;
        }

        .restaurant-card:hover {
            transform: translateY(-8px);
        }

        .restaurant-card img {
            width: 180px;
            height: 130px;
            object-fit: cover;
            border-radius: 15px;
            transition: 0.3s;
        }

        .restaurant-card img:hover {
            transform: scale(1.05);
        }

        .restaurant-details {
            flex: 1;
        }

        .restaurant-details h2 {
            margin: 0;
            color: white;
            font-size: 28px;
        }

        .restaurant-details p {
            margin: 10px 0;
            color: white;
            font-size: 16px;
        }

        .view-btn {
            display: inline-block;

            margin-top: 10px;

            padding: 12px 20px;

            border-radius: 10px;

            text-decoration: none;

            color: white;

            font-weight: bold;

            background: linear-gradient(135deg,
                    #ff4d2e,
                    #ff7a59);

            box-shadow:
                0 4px 15px rgba(255, 77, 46, 0.4);

            transition: 0.3s;
        }

        .view-btn:hover {
            transform: translateY(-3px);

            box-shadow:
                0 8px 20px rgba(255, 77, 46, 0.6);
        }
    </style>
</head>

<body>
    <h1>🍽 Restaurants List</h1>

    <div class="restaurant-container">

        {% for restaurant in restaurants %}

        <div class="restaurant-card">

            {% if restaurant.image %}
            <img src="{{ restaurant.image.url }}">
            {% endif %}

            <div class="restaurant-details">

                <h2>🍽 {{ restaurant.name }}</h2>

                <p>{{ restaurant.address }}</p>

                <a class="view-btn" href="{% url 'restaurant_detail' restaurant.id %}">
                    View Menu
                </a>

            </div>

        </div>

        {% endfor %}

    </div>
</body>

</html>

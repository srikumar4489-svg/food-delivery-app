<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Restaurant</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4');
            padding: 20px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .container {
            width: 480px;
            padding: 35px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: white;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        }

        label {
            display: block;
            color: white;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 18px;
        }

        input[type="text"],
        textarea,
        input[type="file"] {
            width: 100%;
            margin-top: 8px;
            padding: 14px;
            border-radius: 12px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            font-size: 15px;
            transition: 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        textarea {
            height: 100px;
            resize: none;
        }

        input[type="file"] {
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(45deg, #ff6b00, #ff9500);
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(255, 107, 0, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 107, 0, 0.6);
        }

        button:active {
            transform: scale(0.98);
        }
        .image{
            color: black;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Add Restaurant</h1>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <label for="">Restaurant Name
                <input type="text" name="name" placeholder="Restaurant Name" required>
            </label>

            <label for="">Address
                <textarea name="address" placeholder="Address" required></textarea>
            </label>

            <label for="">Phone Number
                <input type="text" name="phone" placeholder="Phone Number" required>
            </label>

            <label for="">Image
                <input type="file" name="image" class="image" required>
            </label>

            <button type="submit">
                Save
            </button>

        </form>

    </div>

</body>

</html>

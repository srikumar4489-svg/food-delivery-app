<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Food</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;

            background:
                linear-gradient(rgba(0, 0, 0, 0.7),
                    rgba(0, 0, 0, 0.7)),
                url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5');

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .con {
            width: 500px;
            padding: 35px;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;

            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 34px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        label {
            display: block;
            color: white;
            font-weight: 600;
            margin-bottom: 15px;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 14px;
            margin-top: 8px;

            border: none;
            outline: none;
            border-radius: 12px;

            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 15px;

            transition: 0.3s;
        }

        input:focus,
        textarea:focus {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        textarea {
            height: 100px;
            resize: none;
        }

        img {
            display: block;
            margin: 20px auto;
            width: 180px;
            height: 180px;
            object-fit: cover;

            border-radius: 20px;
            border: 4px solid #ffb347;

            box-shadow: 0 10px 25px rgba(255, 179, 71, 0.4);
            transition: 0.4s;
        }

        img:hover {
            transform: scale(1.05);
        }

        button {
            width: 100%;
            padding: 15px;

            border: none;
            border-radius: 12px;

            background: linear-gradient(45deg,
                    #ff6b00,
                    #ff9500);

            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;

            transition: 0.3s;

            box-shadow: 0 8px 20px rgba(255, 107, 0, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 107, 0, 0.6);
        }

        button:active {
            transform: scale(0.98);
        }

        .preview-text {
            text-align: center;
            color: #ffd27f;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="con">

        <h1>🍔 Edit Food Item</h1>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <label for="">Food Name
                <input type="text" name="name" value="{{ food.name }}" required>
            </label>

            <label for="">Description
                <textarea name="description" >{{ food.description }}</textarea>
            </label>

            <label for="">Price
                <input type="number" name="price" value="{{ food.price }}" required>
            </label>

            {% if food.image %}
            <p class="preview-text" >Current Food Image</p>
            <img src="{{ food.image.url }}" >
            {% endif %}

            <label for="">image
                <input type="file" name="image">
            </label>

            <button type="submit">
                Update Food
            </button>

        </form>

    </div>
</body>

</html>

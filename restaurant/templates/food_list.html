<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            padding: 40px;

            background:
                linear-gradient(rgba(0, 0, 0, 0.7),
                    rgba(0, 0, 0, 0.7)),
                url('https://images.unsplash.com/photo-1504674900247-0877df9cc836');

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 45px;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-shadow: 3px 3px 15px rgba(0, 0, 0, 0.5);
        }

        .con {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .food-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            overflow: hidden;

            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            transition: 0.4s;
        }

        .food-card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 15px 40px rgba(255, 140, 0, 0.5);
        }

        .food-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            transition: 0.5s;
        }

        .food-card:hover img {
            transform: scale(1.08);
        }

        .food-content {
            padding: 20px;
        }

        .food-content h3 {
            color: white;
            font-size: 24px;
            margin-bottom: 12px;
        }

        .food-content p {
            color: #f1f1f1;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .price {
            color: #ffb347 !important;
            font-size: 22px !important;
            font-weight: bold;
        }

        .btns {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .edit-btn,
        .delete-btn {
            flex: 1;
            text-decoration: none;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .edit-btn {
            background: linear-gradient(45deg,
                    #00b09b,
                    #96c93d);
        }

        .delete-btn {
            background: linear-gradient(45deg,
                    #ff416c,
                    #ff4b2b);
        }

        .edit-btn:hover,
        .delete-btn:hover {
            transform: translateY(-3px);
        }

        .food-content::after {
            content: "🍽 Premium Food";
            display: inline-block;
            margin-top: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            background: linear-gradient(45deg,
                    #ff7b00,
                    #ffb347);

            color: white;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>🍔 Premium Food Menu</h1>

    <div class="con">

        {% for food in foods %}

        <div class="food-card">

            <img src="{{ food.image.url }}" width="200">

            <div class="food-content">

                <h3>{{ food.name }}</h3>

                <p>{{ food.description }}</p>

                <p class="price">₹ {{ food.price }}</p>

                <div class="btns">

                    <a href="{% url 'edit_food' food.id %}" class="edit-btn">
                        Edit
                    </a>

                    <a href="{% url 'delete_food' food.id %}" onclick="return confirm('Delete this food?')"
                        class="delete-btn">
                        Delete
                    </a>
                </div>

            </div>

        </div>

        {% endfor %}
    </div>
</body>

</html>

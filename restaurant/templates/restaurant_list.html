<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            padding: 40px;

            background:
                linear-gradient(rgba(0, 0, 0, 0.65),
                    rgba(0, 0, 0, 0.65)),
                url('https://images.unsplash.com/photo-1514933651103-005eec06c04b');

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 45px;
            margin-bottom: 40px;
            text-shadow: 3px 3px 15px rgba(0, 0, 0, 0.6);
            letter-spacing: 2px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            overflow: hidden;

            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            transition: 0.4s;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 15px 40px rgba(255, 140, 0, 0.4);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: 0.5s;
        }

        .card:hover img {
            transform: scale(1.08);
        }

        .card-body {
            padding: 20px;
        }

        .card-body h3 {
            color: white;
            font-size: 24px;
            margin-bottom: 12px;
        }

        .card-body p {
            color: #f1f1f1;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .phone {
            color: #ffb347 !important;
            font-size: 16px;
            font-weight: bold;
        }

        .card-body::after {
            content: "⭐ Premium Restaurant";
            display: inline-block;
            margin-top: 10px;
            padding: 6px 12px;
            border-radius: 20px;
            background: linear-gradient(45deg, #ff7b00, #ffb347);
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1> 🍽️ Premium Restaurants</h1>

    <div class="container">

        {% for restaurant in restaurants %}

        <div class="card">

            {% if restaurant.image %}
            <img src="{{ restaurant.image.url }}">
            {% endif %}

            <div class="card-body">

                <h3>{{ restaurant.name }}</h3>

                <p>{{ restaurant.address }}</p>

                <p class="phone">📞 {{ restaurant.phone }}</p>

            </div>

        </div>

        {% endfor %}

    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background:
                linear-gradient(rgba(0, 0, 0, 0.7),
                    rgba(0, 0, 0, 0.7)),
                url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4');

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        form {
            width: 420px;
            padding: 40px;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;

            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .logo {
            font-size: 55px;
            margin-bottom: 10px;
        }

        h2 {
            color: white;
            margin-bottom: 25px;
            font-size: 32px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        label {
            display: block;
            text-align: left;
            color: white;
            font-weight: 600;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-top: 8px;

            border: none;
            outline: none;
            border-radius: 12px;

            background: rgba(255, 255, 255, 0.9);
            font-size: 15px;

            transition: 0.3s;
        }

        input:focus {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 10px;

            border: none;
            border-radius: 12px;

            background: linear-gradient(45deg,
                    #ff6b00,
                    #ff9500);

            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;

            transition: 0.3s;

            box-shadow: 0 8px 20px rgba(255, 107, 0, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 107, 0, 0.6);
        }

        .forgot {
            margin-top: 18px;
            color: white;
            font-size: 14px;
        }

        .forgot a {
            color: #ffb347;
            text-decoration: none;
            font-weight: bold;
        }

        .forgot a:hover {
            text-decoration: underline;
        }

        .error {
            color: #ffb3b3;
            margin-top: 12px;
            font-weight: bold;
        }

        .welcome {
            color: #f8f8f8;
            margin-bottom: 25px;
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <form method="POST">
        {% csrf_token %}

        <div class="logo">🍔</div>
        <h2>Welcome Back</h2>
        <p class="welcome">
            Sign in to continue your food journey
        </p>

        <label for="">E-Mail
            <input type="email" name="email" placeholder="Email" required>
        </label>

        <label for="">Password
            <input type="password" name="password" placeholder="Password" required>
        </label>

        <button type="submit">Login →</button>

        <p class="forgot">Forgot Password? <a href="{% url 'forgot_password' %}">Reset Here</a></p>

        {% if error %}
        <p style="color: red;">{{error}}</p>
        {% endif %}
    </form>


</body>

</html>

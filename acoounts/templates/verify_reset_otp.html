<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background:
                linear-gradient(rgba(0, 0, 0, 0.7),
                    rgba(0, 0, 0, 0.7)),
                url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4');

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        form {
            width: 420px;
            padding: 40px;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;

            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .icon {
            font-size: 55px;
            margin-bottom: 10px;
        }

        h2 {
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            color: #f1f1f1;
            font-size: 14px;
            margin-bottom: 25px;
        }

        label {
            display: block;
            text-align: left;
            color: white;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            margin-bottom: 20px;

            border: none;
            outline: none;
            border-radius: 12px;

            background: rgba(255, 255, 255, 0.9);

            text-align: center;
            letter-spacing: 5px;
            font-size: 20px;
            font-weight: bold;

            transition: 0.3s;
        }

        input:focus {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        button {
            width: 100%;
            padding: 15px;

            border: none;
            border-radius: 12px;

            background: linear-gradient(45deg,
                    #ff6b00,
                    #ff9500);

            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;

            transition: 0.3s;

            box-shadow: 0 8px 20px rgba(255, 107, 0, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 107, 0, 0.6);
        }

        .msg {
            margin-top: 15px;
            color: #ffb3b3;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <form method="POST">
        {% csrf_token %}

        <div class="icon">📩</div>

        <h2>Verify OTP</h2>

        <p class="subtitle">
            Enter the OTP sent to your email address
        </p>

        <label for="">Enter OTP
            <input type="text" name="otp" placeholder="Enter OTP">
        </label>

        <button type="submit">Verify OTP →</button>

        {% if messages %}
        {% for message in messages %}
        <p class="msg">{{ message }}</p>
        {% endfor %}
        {% endif %}
    </form>
</body>

</html>

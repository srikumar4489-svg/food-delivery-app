<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding:20px;

            background:
                linear-gradient(rgba(0, 0, 0, 0.7),
                    rgba(0, 0, 0, 0.7)),
                url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4');

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        form {
            width: 430px;
            padding: 40px;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;

            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .logo {
            font-size: 55px;
            margin-bottom: 10px;
        }

        h2 {
            color: white;
            font-size: 32px;
            margin-bottom: 8px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            color: #f1f1f1;
            font-size: 14px;
            margin-bottom: 25px;
        }

        label {
            display: block;
            text-align: left;
            color: white;
            font-weight: 600;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-top: 8px;

            border: none;
            outline: none;
            border-radius: 12px;

            background: rgba(255, 255, 255, 0.9);
            font-size: 15px;

            transition: 0.3s;
        }

        input:focus {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 10px;

            border: none;
            border-radius: 12px;

            background: linear-gradient(45deg,
                    #ff6b00,
                    #ff9500);

            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;

            transition: 0.3s;

            box-shadow: 0 8px 20px rgba(255, 107, 0, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 107, 0, 0.6);
        }

        h5 {
            margin-top: 20px;
            color: white;
            font-weight: normal;
        }

        a {
            color: #ffb347;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            color: #ffd27f;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <form method="POST">

        <div class="logo">🍔</div>

        <h2>Create Account</h2>

        <p class="subtitle">
            Join and explore delicious food today
        </p>

        {% csrf_token %}

        <label for="">Name
            <input type="text" name="name" placeholder="Name" required>
        </label>

        <label for="">E-Mail
            <input type="email" name="email" placeholder="Email" required>
        </label>

        <label for="">Password
            <input type="password" name="password" placeholder="Password" required>
        </label>

        <button type="submit">Send OTP →</button>

        <h5>Already a customer? <a href="{% url 'login' %}">Login Here</a></h5>
    </form>
</body>

</html>
